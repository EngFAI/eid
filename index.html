<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>عيد أضحى مبارك</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Cairo',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:linear-gradient(160deg,#0a1a0a 0%,#1a3a10 40%,#2d5c1a 70%,#1a3a10 100%);
      color:white;
      position:relative;
      padding: 20px 15px;
    }

    .stars {
      position:absolute;
      width:100%; height:100%;
      overflow:hidden; z-index:0;
      pointer-events:none;
    }

    .star {
      position:absolute;
      width:2px; height:2px;
      background:#fff;
      border-radius:50%;
      animation:twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      from{opacity:0.1;transform:scale(1)}
      to{opacity:0.9;transform:scale(2)}
    }

    .deco-circle {
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(139,195,74,0.15);
      animation:pulse-circle 6s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes pulse-circle {
      0%,100%{transform:scale(1);opacity:0.3}
      50%{transform:scale(1.08);opacity:0.6}
    }

    .moon-deco {
      position:absolute;
      opacity:0.12;
      z-index:0;
      pointer-events:none;
    }

    .card {
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
      background:rgba(10,40,10,0.6);
      backdrop-filter:blur(18px);
      border:1px solid rgba(139,195,74,0.35);
      border-radius:32px;
      padding: 35px 25px 30px;
      text-align:center;
      box-shadow:0 0 60px rgba(50,120,20,0.25),0 20px 50px rgba(0,0,0,0.5);
      animation:float 5s ease-in-out infinite;
      position:relative;
      z-index:2;
    }

    .card::-webkit-scrollbar { width: 0px; }

    @keyframes float {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-12px)}
    }

    .card-ornament {
      font-size: 45px;
      display:block;
      margin-bottom:6px;
    }

    h1 {
      font-size: clamp(24px, 5.5vw, 32px);
      margin-bottom:6px;
      color:#b8f56a;
    }

    .subtitle {
      font-size: clamp(11px, 2.5vw, 13px);
      color:rgba(184,245,106,0.6);
      margin-bottom:22px;
    }

    .divider {
      width:80px;
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(139,195,74,0.7),transparent);
      margin:0 auto 22px;
    }

    .icons-row {
      display:flex;
      justify-content:center;
      gap:18px;
      font-size:28px;
      margin-bottom:20px;
    }

    .icon-item { animation:bounce 2s infinite; }

    @keyframes bounce {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
    }

    .message {
      font-size: clamp(15px, 3.8vw, 18px);
      line-height:1.8;
      margin-bottom:22px;
      color:#f0ffe0;
    }

    .name { color:#b8f56a; font-weight:bold; }

    .from-line {
      font-size:13px;
      color:rgba(255,255,255,0.55);
    }

    canvas {
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
    }

    .footer {
      position:fixed;
      bottom:10px;
      width:100%;
      text-align:center;
      font-size:12px;
      color:rgba(255,255,255,0.35);
      z-index:2;
    }

    /* رسالة التشغيل */
    #tapHint {
      position:fixed;
      top:15px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.4);
      color:#b8f56a;
      padding:8px 14px;
      border-radius:20px;
      font-size:13px;
      z-index:999;
      backdrop-filter:blur(10px);
    }
  </style>
</head>

<body>

<div id="tapHint">👆 انقر في أي مكان لتشغيل الصوت</div>

<div class="stars" id="stars"></div>

<div class="card">
  <span class="card-ornament">🕌</span>
  <h1>عيد أضحى مبارك</h1>

  <p class="subtitle">✦ تقبّل الله منا ومنكم صالح الأعمال ✦</p>

  <div class="divider"></div>

  <div class="icons-row">
    <span class="icon-item">🐑</span>
    <span class="icon-item">🌙</span>
    <span class="icon-item">🌿</span>
  </div>

  <div class="message" id="greeting">
    عيد أضحى مبارك 🌙<br>
    الله يديم عليك الصحة والسعادة<br>
    ويجعل أيامك كلها أعياد 🤍
  </div>

  <p class="from-line">من <span class="name">بتول الجمعة</span> 💚</p>
</div>

<div class="footer">Made by <b>engFAI</b></div>

<canvas id="confetti"></canvas>

<script>
// النجوم
const starsContainer = document.getElementById('stars');

for (let i = 0; i < 45; i++) {
  const star = document.createElement('div');
  star.classList.add('star');
  star.style.top = Math.random() * 100 + '%';
  star.style.left = Math.random() * 100 + '%';
  star.style.animationDuration = (Math.random() * 3 + 2) + 's';
  starsContainer.appendChild(star);
}

// اسم من الرابط
const params = new URLSearchParams(window.location.search);
const name = params.get('name');

if (name) {
  document.getElementById('greeting').innerHTML =
    `عيد أضحى مبارك <span class='name'>${name}</span> 🌙<br>
     الله يديم عليك الصحة والسعادة<br>
     ويجعل أيامك كلها أعياد 🤍`;
}

// كونفيتي
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#b8f56a','#facc15','#ff9e80','#80deea','#ce93d8','#fff'];
let pieces = [];

function launchConfetti() {
  for (let i = 0; i < 130; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.5,
      r: Math.random() * 5 + 2,
      vy: Math.random() * 2 + 0.8,
      vx: (Math.random() - 0.5) * 1.5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rot: Math.random() * 360,
      rs: (Math.random() - 0.5) * 4
    });
  }
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  pieces.forEach((p, index) => {
    p.y += p.vy;
    p.x += p.vx;
    p.rot += p.rs;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.r, -p.r, p.r * 2, p.r * 2);
    ctx.restore();

    if (p.y > canvas.height) {
      p.y = -10;
      p.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(draw);
}

// الصوت + التشغيل
const music = document.getElementById('music');
const tapHint = document.getElementById('tapHint');
let started = false;

function startAll() {
  if (started) return;

  music.play().then(() => {
    launchConfetti();
    started = true;
    tapHint.style.display = "none";
  }).catch(() => {});
}

document.addEventListener('click', startAll);
document.addEventListener('touchstart', startAll);
</script>
